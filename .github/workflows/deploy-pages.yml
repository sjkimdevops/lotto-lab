name: GitHub Pages 배포

on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["복권 당첨번호 자동 업데이트"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: GitHub Pages 설정
        uses: actions/configure-pages@v5

      - name: 정적 파일 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: GitHub Pages 배포
        id: deployment
        uses: actions/deploy-pages@v4
