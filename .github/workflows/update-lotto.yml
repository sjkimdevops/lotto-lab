name: 복권 당첨번호 자동 업데이트

on:
  schedule:
    # 매주 토요일 12:30 UTC = 21:30 KST (로또 추첨 후 약 45분)
    - cron: '30 12 * * 6'
    # 매주 목요일 13:00 UTC = 22:00 KST (연금복권 추첨 후 약 1시간)
    - cron: '0 13 * * 4'
  workflow_dispatch: # 수동 실행 버튼

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 의존성 설치
        run: npm install

      - name: Playwright 브라우저 설치
        run: npx playwright install chromium --with-deps

      - name: 로또 6/45 데이터 업데이트
        run: node fetch-lotto-playwright.js

      - name: 연금복권 720+ 데이터 업데이트
        run: node fetch-pension-playwright.js

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet public/data/lotto.json public/data/pension.json || (
            git add public/data/lotto.json public/data/pension.json &&
            git commit -m "data: 복권 당첨번호 자동 업데이트 ($(date +'%Y-%m-%d'))" &&
            git push
          )
