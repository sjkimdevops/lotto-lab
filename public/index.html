<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a18">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>복권월드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">
  <!-- 헤더 -->
  <div class="header">
    <h1>복권월드</h1>
    <div class="sub">데이터 기반 번호 추천</div>
    <div class="status-bar">
      <div class="status-chip loading" id="statusChip">
        <span class="dot"></span>
        <span id="statusText">준비중...</span>
      </div>
      <a href="https://www.dhlottery.co.kr/" target="_blank" rel="noopener" class="status-chip">
        🎯 동행복권
      </a>
    </div>
  </div>

  <!-- 로또 6/45 섹션 -->
  <div id="section-lotto">
    <div class="sub-tabs">
      <button class="sub-tab active" data-sub="lotto-gen" onclick="switchSub('lotto-gen')">번호 생성</button>
      <button class="sub-tab" data-sub="lotto-stats" onclick="switchSub('lotto-stats')">통계 분석</button>
      <button class="sub-tab" data-sub="lotto-history" onclick="switchSub('lotto-history')">히스토리</button>
    </div>
    <div id="sub-lotto-gen"></div>
    <div id="sub-lotto-stats" class="hidden"></div>
    <div id="sub-lotto-history" class="hidden"></div>
  </div>

  <!-- 연금복권 섹션 -->
  <div id="section-pension" class="hidden">
    <div class="sub-tabs">
      <button class="sub-tab active" data-psub="pension-gen" onclick="switchPensionSub('pension-gen')">번호 생성</button>
      <button class="sub-tab" data-psub="pension-info" onclick="switchPensionSub('pension-info')">당첨 분석</button>
      <button class="sub-tab" data-psub="pension-history" onclick="switchPensionSub('pension-history')">히스토리</button>
    </div>
    <div id="sub-pension-gen"></div>
    <div id="sub-pension-info" class="hidden"></div>
    <div id="sub-pension-history" class="hidden"></div>
  </div>

  <!-- 마이 섹션 -->
  <div id="section-my" class="hidden"></div>
</div>

<nav class="bottom-nav" id="bottomNav">
  <button class="nav-item active" id="navLotto" onclick="switchNav('lotto')">
    <span class="nav-icon">🎰</span>
    <span class="nav-label">로또</span>
  </button>
  <button class="nav-item" id="navPension" onclick="switchNav('pension')">
    <span class="nav-icon">🏦</span>
    <span class="nav-label">연금복권</span>
  </button>
  <button class="nav-item" id="navMy" onclick="switchNav('my')">
    <span class="nav-icon">👤</span>
    <span class="nav-label">마이</span>
  </button>
</nav>
<div class="copy-toast" id="copyToast">번호가 복사되었습니다</div>

<script src="js/app.js"></script>
<script src="js/history.js"></script>
<script src="js/lotto.js"></script>
<script src="js/pension.js"></script>
</body>
</html>
